name: GramCare AI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: gramcare_user
          POSTGRES_PASSWORD: securepassword123
          POSTGRES_DB: gramcare_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install Dependencies
      working-directory: ./apps/backend_service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx
        
    - name: Run Backend Tests
      working-directory: ./apps/backend_service
      env:
        DATABASE_URL: postgresql://gramcare_user:securepassword123@localhost:5432/gramcare_db
        SECRET_KEY: test-secret-key
        GEMINI_API_KEY: mock-api-key
      run: |
        pytest tests/

  build-web-portal:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './apps/web_portal/package-lock.json'
        
    - name: Install & Build
      working-directory: ./apps/web_portal
      run: |
        npm ci
        npm run build
        
  build-pharmacy-portal:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './apps/react_dashboard/package-lock.json'
        
    - name: Install & Build
      working-directory: ./apps/react_dashboard
      run: |
        npm ci
        npm run build

  build-mobile-app:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.19.0'
        cache: true
        
    - name: Install & Analyze
      working-directory: ./apps/mobile_app
      run: |
        flutter pub get
        flutter analyze
