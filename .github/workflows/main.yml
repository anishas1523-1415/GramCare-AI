name: GramCare AI CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/backend_service/requirements.txt
        pip install pytest httpx
        
    - name: Lint with Flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 apps/backend_service --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Pytest (Mocked)
      run: |
        echo "Running backend unit tests (TODO: Implement test suite in Phase 13)"

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Patient App Build Test
      run: |
        cd apps/suites/patient_app/mobile_app/react_ui
        npm install
        npm run build

    - name: Doctor App Build Test
      run: |
        cd apps/suites/doctor_hospital_suite/web_app
        npm install
        npm run build
